# Real correlation search that ENFORCES Argus's blocklist: it scans Splunk data,
# coalesces a candidate indicator (IP/user) from each event, looks it up against
# the argus_threat_blocklist KV collection, and reports every match. When Argus
# blocks an indicator that is present in the data, this search fires on it.

[Argus - Threat Blocklist Enforcement]
description = Fires when any event involves an IP or user on the Argus threat blocklist. Argus writes the blocklist; this search enforces it against Splunk data.
search = index=botsv3 \
| eval argus_indicator = coalesce(src_ip, dest_ip, src, dest, sourceIPAddress, user, userIdentity.userName) \
| search argus_indicator=* \
| lookup argus_threat_blocklist indicator AS argus_indicator OUTPUT reason AS argus_reason severity AS argus_severity case_id AS argus_case_id added_by AS argus_added_by \
| where isnotnull(argus_reason) \
| stats count AS event_count min(_time) AS first_seen max(_time) AS last_seen values(sourcetype) AS sourcetypes by argus_indicator argus_reason argus_severity argus_case_id \
| convert ctime(first_seen) ctime(last_seen)
dispatch.earliest_time = 0
dispatch.latest_time = now
enableSched = 0
cron_schedule = */10 * * * *
counttype = number of events
relation = greater than
quantity = 0
alert.track = 1
alert.severity = 4
is_visible = 1

[Argus - Demo: AWS Credential Abuse Notable]
description = Demo detection that emits AWS API-abuse rows and sends them to Argus through the custom alert action. Disabled by default; enable or run manually for the hackathon demo.
search = index=botsv3 sourcetype=aws:cloudtrail (errorCode="Client.UnauthorizedOperation" OR errorCode="AccessDenied" OR errorCode="Client.InstanceLimitExceeded") \
| stats count values(eventName) AS events values(errorCode) AS error_codes by sourceIPAddress userIdentity.userName \
| where count > 20 \
| sort - count
dispatch.earliest_time = 0
dispatch.latest_time = now
enableSched = 0
cron_schedule = */10 * * * *
counttype = number of events
relation = greater than
quantity = 0
alert.track = 1
alert.severity = 4
action.argus_investigate = 1
action.argus_investigate.param.argus_url = http://127.0.0.1:8010/api/splunk/alert
action.argus_investigate.param.auto_respond = 0
action.argus_investigate.param.multi = 0
action.argus_investigate.param.max_turns = 8
is_visible = 1
