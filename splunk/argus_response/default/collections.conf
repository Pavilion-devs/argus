# KV-store collections backing Argus's real response actions.

[argus_threat_blocklist]
# One row per blocked indicator (ip / user / domain / hash). Enforced by the
# "Argus - Threat Blocklist Enforcement" correlation search.
field.indicator = string
field.type = string
field.reason = string
field.severity = string
field.case_id = string
field.added_by = string
field.added_at = string
accelerated_fields.idx_indicator = {"indicator": 1}

[argus_cases]
# One row per investigation Argus has run (the real "notable"/case record).
field.case_id = string
field.title = string
field.verdict = string
field.severity = string
field.confidence = number
field.summary = string
field.entities = string
field.iocs = string
field.created_at = string
field.status = string
accelerated_fields.idx_case = {"case_id": 1}
