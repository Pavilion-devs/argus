# Lookup definitions backed by the KV-store collections, so the blocklist and
# case store are usable from SPL (lookup / inputlookup) anywhere.

[argus_threat_blocklist]
external_type = kvstore
collection = argus_threat_blocklist
fields_list = _key, indicator, type, reason, severity, case_id, added_by, added_at

[argus_cases]
external_type = kvstore
collection = argus_cases
fields_list = _key, case_id, title, verdict, severity, confidence, risk_score, risk_band, summary, entities, iocs, created_at, status
