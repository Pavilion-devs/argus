# Argus low-memory tuning for a single 4 GB Splunk instance.
# BOTSv3 ships pre-indexed, so there is no ingest pressure — the only memory
# spikes come from searches. Cap concurrency and per-search memory so a heavy
# ad-hoc search can't OOM the box.

[search]
max_searches_per_cpu = 1
base_max_searches = 2
max_rt_search_multiplier = 1
# A single search spills to disk past this instead of ballooning RAM.
max_mem_usage_mb = 1024

[scheduler]
# Don't let scheduled/saved searches monopolize the two vCPUs.
max_searches_perc = 25
